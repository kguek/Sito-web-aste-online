<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Gestione Aste</title>
</head>

<body>
    <header>
        <h1>Gestione Aste</h1>
        <nav>
            <a href="/">Home</a>
            {% if request.user.is_authenticated %}
            Benvenuto, <strong>{{request.user.username}}</strong>, <a href="{% url 'asta-nuova' %}"> Inserisci Asta</a>|
            <a href="{% url 'area_personale' %}">Area Personale</a>
            <a href="{% url 'aste_preferite' %}">Wishlist</a>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <input type="submit" value="Logout">
            </form>
            {% else %}
            <a href="{% url 'login' %}">Login</a> |
            <a href="{% url 'registrazione' %}">Registrazione</a>
            {% endif %}
        </nav>
        <div style="margin-top: 15px; padding: 10px; background-color: #e9ecef; border-radius: 5px;">
            <form method="get" action="{% url 'home' %}"
                style="margin: 0; display: flex; gap: 10px; align-items: center;">
                <label for="q">Cerca:</label>
                <input type="text" name="q" id="q" placeholder="Cosa cerchi?" value="{{ request.GET.q }}">

                <label for="categoria">Categoria:</label>
                <select name="categoria" id="categoria">
                    <option value="">Tutte le categorie</option>
                    {% for cat in categorie_globali %}
                    {% if request.GET.categoria == cat.id|stringformat:"s" %}
                    <option value="{{ cat.id }}" selected>{{ cat.nome }}</option>
                    {% else %}
                    <option value="{{ cat.id }}">{{ cat.nome }}</option>
                    {% endif %}
                    {% endfor %}
                </select>

                <button type="submit">Filtra</button>
            </form>
        </div>
        <hr>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>Gestione Aste</p>
    </footer>
</body>

</html>
